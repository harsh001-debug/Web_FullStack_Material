<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Countdown Timer</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1 class="title">Summer Olympics 2028 Countdown</h1>

    <div class="countdown">

        <div class="bucket">
            <span id="days">0</span>
            <p>Days</p>
        </div>

        <div class="bucket">
            <span id="hours">0</span>
            <p>Hours</p>
        </div>

        <div class="bucket">
            <span id="minutes">0</span>
            <p>Minutes</p>
        </div>

        <div class="bucket">
            <span id="seconds">0</span>
            <p>Seconds</p>
        </div>

    </div>

</div>

<script src="./script.js"></script>

</body>
</html>
